spring.application.name=spring-boot
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5332/capybara_chess}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:capybara}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:capybara_chess}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true